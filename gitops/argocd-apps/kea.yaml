apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kea
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/IonBlaster77/homelab.git
    targetRevision: HEAD
    path: clusters/homelab/kea
  destination:
    server: https://kubernetes.default.svc
    namespace: kea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
