# ArgoCD Application — Cilium CNI (umbrella Helm chart, git-path source)
#
# Source is now clusters/homelab/cilium-chart/ in this git repo — an umbrella
# chart that declares cilium v1.17.0 as a dependency.  The chart tarball is
# vendored in cilium-chart/charts/cilium-1.17.0.tgz so ArgoCD never reaches
# out to helm.cilium.io at sync time.
#
# Why umbrella chart instead of direct Helm repo source?
#   ArgoCD v3 has a semver bug: when repoURL is a Helm HTTP index, the
#   GenerateManifest RPC fails with "improper constraint: HEAD" even when
#   targetRevision is a valid semver like 1.17.0.  The git-path code path
#   is unaffected — ArgoCD runs `helm dependency build` using Chart.lock
#   (which has the exact version + digest) and skips all version resolution.
#
# This Application takes over management of the Cilium Helm release that was
# installed manually during bootstrap (clusters/homelab/bootstrap/cilium-values.yaml).
# ArgoCD "adopts" the existing release because the release name (cilium),
# namespace (kube-system), and all resource names match.
#
# Sync is MANUAL — you control when Cilium upgrades happen. This is intentional:
# a bad Cilium upgrade breaks all cluster networking instantly.
#
# To upgrade Cilium:
#   1. Edit clusters/homelab/cilium-chart/Chart.yaml — bump the dependency version
#   2. Run: helm dependency update clusters/homelab/cilium-chart
#   3. Commit Chart.lock and charts/cilium-X.Y.Z.tgz, delete the old .tgz
#   4. Manually sync this Application in ArgoCD
#
# IP assignments on VLAN 20 (10.77.20.0/24):
#   10.77.20.50  — ArgoCD server      (pinned in clusters/homelab/bootstrap/argocd-values.yaml)
#   10.77.20.51  — Longhorn UI        (pinned in gitops/argocd-apps/longhorn.yaml)
#   10.77.20.60  — shared Gateway     (pinned in clusters/homelab/gateway/gateway.yaml)
#   10.77.20.53+ — future services    (assigned from pool in clusters/homelab/cilium/ip-pool.yaml)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/IonBlaster77/homelab.git
    targetRevision: HEAD
    path: clusters/homelab/cilium-chart
    helm:
      # releaseName must match the existing Helm release so ArgoCD adopts it
      # rather than creating a duplicate release alongside the bootstrapped one.
      releaseName: cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
    # No automated sync — Cilium upgrades are high-risk and should be manual.
    # ServerSideApply=true: ArgoCD manages only the fields in the Helm template
    # (its "argocd" field manager). Fields owned by other managers — Helm's
    # app.kubernetes.io/managed-by label, controller-added annotations like
    # deprecated.daemonset.template.generation, kubectl rollout restart's
    # restartedAt — are never part of ArgoCD's diff. This eliminates all
    # "empty-object vs absent" false-positive OutOfSync diffs.
  ignoreDifferences:
    # cilium-config has runtime IPAM fields not in the chart values
    - group: ""
      kind: ConfigMap
      name: cilium-config
      namespace: kube-system
      jsonPointers:
        - /data/ipam-multi-pool-pre-allocation

    # NodePort assignments are runtime-allocated, not in the chart
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.ports[].nodePort

    # cilium-ca and hubble-server-certs are generated by the certgen Helm hook.
    # ArgoCD's helm template regenerates fresh cert values each render, so the
    # diff always shows here — but helm upgrade will NOT replace certs because
    # certgen checks for existing valid certs before generating.
    # ignoreDifferences keeps the status clean without masking real changes.
    - group: ""
      kind: Secret
      name: cilium-ca
      namespace: kube-system
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-server-certs
      namespace: kube-system
      jsonPointers:
        - /data

    # DaemonSet: kubectl.kubernetes.io/restartedAt annotation is added by manual
    # restarts (kubectl rollout restart) and is not part of the chart template.
    # startupProbe.timeoutSeconds is a kubelet-defaulted field (defaults to 1).
    # deprecated.daemonset.template.generation is added by the DaemonSet controller
    # to the DaemonSet metadata when the pod template spec changes — not in template.
    - group: apps
      kind: DaemonSet
      name: cilium
      namespace: kube-system
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        - /spec/template/spec/containers/0/startupProbe/timeoutSeconds
        - /metadata/annotations/deprecated.daemonset.template.generation

    # GatewayClass: the chart template has NO labels (only optional commonLabels).
    # Helm adds app.kubernetes.io/managed-by=Helm post-install, so the live
    # GatewayClass has a non-empty labels map while the template produces none.
    # After removing the managed-by key, live has labels:{} while desired has
    # no labels key at all — these differ as {} != absent.
    # Solution: ignore the entire labels map (the template never sets labels here).
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      name: cilium
      jqPathExpressions:
        - .metadata.labels

    # Roles/RoleBindings for gateway secrets: same Helm-added label pattern.
    # All four gateway/operator-gateway roles and bindings in cilium-secrets ns.
    - group: rbac.authorization.k8s.io
      kind: Role
      namespace: cilium-secrets
      jsonPointers:
        - /metadata/labels/app.kubernetes.io~1managed-by
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      namespace: cilium-secrets
      jsonPointers:
        - /metadata/labels/app.kubernetes.io~1managed-by

    # helm.sh/chart label: umbrella chart renders "cilium-wrapper-0.1.0" but
    # the live resources show "cilium-1.17.0" (set at bootstrap time).
    # Ignore across all resource types to keep status clean.
    - group: ""
      kind: ConfigMap
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
        - /spec/template/metadata/labels/helm.sh~1chart
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
        - /spec/template/metadata/labels/helm.sh~1chart
    - group: ""
      kind: Service
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: rbac.authorization.k8s.io
      kind: Role
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/labels/helm.sh~1chart
