# ArgoCD Application — Cilium CNI (Helm chart)
#
# This Application takes over management of the Cilium Helm release that was
# installed manually during bootstrap. ArgoCD "adopts" the existing release
# because the chart name, namespace, and release name all match the manual install.
#
# Sync is MANUAL — you control when Cilium upgrades happen. This is intentional:
# a bad Cilium upgrade breaks all cluster networking instantly.
#
# project: default is used (not homelab) because the homelab AppProject only
# allows sources from github.com/IonBlaster77/homelab.git, but this chart
# comes from helm.cilium.io. Same reason longhorn uses project: default.
#
# IP assignments on VLAN 20 (10.77.20.0/24):
#   10.77.20.50  — ArgoCD server      (pinned in clusters/homelab/bootstrap/argocd-values.yaml)
#   10.77.20.51  — Longhorn UI        (pinned in gitops/argocd-apps/longhorn.yaml)
#   10.77.20.60  — shared Gateway     (pinned in clusters/homelab/gateway/gateway.yaml)
#   10.77.20.53+ — future services    (assigned from pool in clusters/homelab/cilium/ip-pool.yaml)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    # Pin to the exact version used during bootstrap so ArgoCD doesn't
    # try to "fix" a version drift on first sync.
    # Check available versions: helm search repo cilium/cilium --versions
    targetRevision: 1.17.0
    helm:
      # These values must stay in sync with clusters/homelab/bootstrap/cilium-values.yaml.
      # If they drift, ArgoCD will show OutOfSync and overwrite the live config on next sync.
      values: |
        kubeProxyReplacement: true
        k8sServiceHost: 10.77.20.10
        k8sServicePort: 6443
        l2announcements:
          enabled: true
          leaseDuration: 15s
          renewDeadline: 5s
          retryPeriod: 2s
        bgpControlPlane:
          enabled: true
        gatewayAPI:
          enabled: true
        operator:
          replicas: 1
        cgroup:
          autoMount:
            enabled: false
          hostRoot: /sys/fs/cgroup
        securityContext:
          capabilities:
            ciliumAgent:
              - CHOWN
              - KILL
              - NET_ADMIN
              - NET_RAW
              - IPC_LOCK
              - SYS_ADMIN
              - SYS_RESOURCE
              - DAC_OVERRIDE
              - FOWNER
              - SETGID
              - SETUID
            cleanCiliumState:
              - NET_ADMIN
              - SYS_ADMIN
              - SYS_RESOURCE
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    # No automated sync — Cilium upgrades are high-risk and should be manual.
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: cilium-config
      namespace: kube-system
      jsonPointers:
        - /data/ipam-multi-pool-pre-allocation
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.ports[].nodePort
