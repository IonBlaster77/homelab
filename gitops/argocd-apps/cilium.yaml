# ArgoCD Application — Cilium CNI (Helm chart)
#
# This Application takes over management of the Cilium Helm release that was
# installed manually during bootstrap. ArgoCD "adopts" the existing release
# because the chart name, namespace, and release name all match the manual install.
#
# Sync is MANUAL — you control when Cilium upgrades happen. This is intentional:
# a bad Cilium upgrade breaks all cluster networking instantly.
#
# project: default is used (not homelab) because the homelab AppProject only
# allows sources from github.com/IonBlaster77/homelab.git, but this chart
# comes from helm.cilium.io. Same reason longhorn uses project: default.
#
# IP assignments on VLAN 20 (10.77.20.0/24):
#   10.77.20.50  — ArgoCD server      (pinned in clusters/homelab/bootstrap/argocd-values.yaml)
#   10.77.20.51  — Longhorn UI        (pinned in gitops/argocd-apps/longhorn.yaml)
#   10.77.20.60  — shared Gateway     (pinned in clusters/homelab/gateway/gateway.yaml)
#   10.77.20.53+ — future services    (assigned from pool in clusters/homelab/cilium/ip-pool.yaml)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    # Pin to the exact version used during bootstrap so ArgoCD doesn't
    # try to "fix" a version drift on first sync.
    # Check available versions: helm search repo cilium/cilium --versions
    targetRevision: 1.17.0
    helm:
      # These values must stay in sync with clusters/homelab/bootstrap/cilium-values.yaml.
      # If they drift, ArgoCD will show OutOfSync and overwrite the live config on next sync.
      values: |
        kubeProxyReplacement: true
        k8sServiceHost: 10.77.20.10
        k8sServicePort: 6443
        routingMode: native
        autoDirectNodeRoutes: true
        ipv4NativeRoutingCIDR: 10.0.0.0/8
        l2announcements:
          enabled: true
          leaseDuration: 15s
          renewDeadline: 5s
          retryPeriod: 2s
        bgpControlPlane:
          enabled: true
        gatewayAPI:
          enabled: true
        operator:
          replicas: 1
        cgroup:
          autoMount:
            enabled: false
          hostRoot: /sys/fs/cgroup
        securityContext:
          capabilities:
            ciliumAgent:
              - CHOWN
              - KILL
              - NET_ADMIN
              - NET_RAW
              - IPC_LOCK
              - SYS_ADMIN
              - SYS_RESOURCE
              - DAC_OVERRIDE
              - FOWNER
              - SETGID
              - SETUID
            cleanCiliumState:
              - NET_ADMIN
              - SYS_ADMIN
              - SYS_RESOURCE
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    # No automated sync — Cilium upgrades are high-risk and should be manual.
  ignoreDifferences:
    # cilium-config has runtime IPAM fields not in the chart values
    - group: ""
      kind: ConfigMap
      name: cilium-config
      namespace: kube-system
      jsonPointers:
        - /data/ipam-multi-pool-pre-allocation

    # NodePort assignments are runtime-allocated, not in the chart
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.ports[].nodePort

    # cilium-ca and hubble-server-certs are generated by the certgen Helm hook.
    # ArgoCD's helm template regenerates fresh cert values each render, so the
    # diff always shows here — but helm upgrade will NOT replace certs because
    # certgen checks for existing valid certs before generating.
    # ignoreDifferences keeps the status clean without masking real changes.
    - group: ""
      kind: Secret
      name: cilium-ca
      namespace: kube-system
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-server-certs
      namespace: kube-system
      jsonPointers:
        - /data

    # DaemonSet: kubectl.kubernetes.io/restartedAt annotation is added by manual
    # restarts (kubectl rollout restart) and is not part of the chart template.
    # startupProbe.timeoutSeconds is a kubelet-defaulted field (defaults to 1).
    - group: apps
      kind: DaemonSet
      name: cilium
      namespace: kube-system
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        - /spec/template/spec/containers/0/startupProbe/timeoutSeconds

    # GatewayClass: status.conditions are set by the Cilium operator at runtime,
    # not by the Helm chart template. ArgoCD ignores .status by default but
    # the GatewayClass diff may include condition fields.
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      name: cilium
      jqPathExpressions:
        - .status.conditions[]

    # Roles/RoleBindings for gateway secrets: Helm adds app.kubernetes.io/managed-by
    # label during helm install/upgrade but the chart template only includes
    # app.kubernetes.io/part-of. ArgoCD sees the extra live label as a diff.
    - group: rbac.authorization.k8s.io
      kind: Role
      namespace: cilium-secrets
      jqPathExpressions:
        - .metadata.labels["app.kubernetes.io/managed-by"]
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      namespace: cilium-secrets
      jqPathExpressions:
        - .metadata.labels["app.kubernetes.io/managed-by"]
