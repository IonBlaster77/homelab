# ArgoCD Application — cert-manager configuration
#
# Applies the cert-manager runtime config after the Helm chart is running:
#   - clusterissuer-staging.yaml  — Let's Encrypt staging (for testing)
#   - clusterissuer-prod.yaml     — Let's Encrypt production (real certs)
#   - cloudflare-secret.yaml      — SOPS-encrypted Cloudflare API token
#                                   (decrypted in-memory by the SOPS CMP sidecar)
#
# The wildcard Certificate for *.jupitertech.net lives in the "gateway"
# Application (clusters/homelab/gateway/certificate.yaml) because the
# resulting TLS secret must be in the "networking" namespace alongside
# the Gateway resource.
#
# Sync order:
#   1. Apply bootstrap/argocd-cmp-configmap.yaml (once, before helm upgrade)
#   2. helm upgrade argo-cd with updated argocd-values.yaml
#   3. cert-manager must be Running before syncing this
#   4. Sync this (applies ClusterIssuers + cloudflare-secret)
#   5. Sync "gateway" (applies Certificate, routes)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/IonBlaster77/homelab.git
    targetRevision: HEAD
    path: clusters/homelab/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
