# ArgoCD Application — cert-manager configuration
#
# Applies the cert-manager runtime config after the Helm chart is running:
#   - clusterissuer-staging.yaml — Let's Encrypt staging (for testing)
#   - clusterissuer-prod.yaml    — Let's Encrypt production (real certs)
#
# Bootstrap note:
#   The cloudflare-api-token Secret is NOT managed by ArgoCD (no SOPS CMP
#   is configured, so ArgoCD would apply the SOPS ciphertext as the literal
#   secret value). Apply it manually once during bootstrap:
#     cd clusters/homelab/bootstrap
#     sops -d cloudflare-secret.yaml | kubectl apply -f -
#
# The wildcard Certificate for *.jupitertech.net lives in the "gateway"
# Application (clusters/homelab/gateway/certificate.yaml) because the
# resulting TLS secret must be in the "networking" namespace alongside
# the Gateway resource.
#
# Sync order:
#   1. cert-manager must be Running before syncing this
#      (ClusterIssuer CRD won't exist until cert-manager is up)
#   2. Apply cloudflare-secret manually (see above)
#   3. Sync this (applies ClusterIssuers)
#   4. Sync "gateway" (applies Certificate, routes)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/IonBlaster77/homelab.git
    targetRevision: HEAD
    path: clusters/homelab/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # Manual sync — ClusterIssuers require cert-manager Running first.
