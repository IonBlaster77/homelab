apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/IonBlaster77/homelab.git
    path: gitops/homepage-chart
    targetRevision: HEAD
    helm:
      releaseName: homepage
      values: |
        enableRbac: true
        serviceAccount:
          name: homepage
          create: true

        env:
          - name: HOMEPAGE_ALLOWED_HOSTS
            value: "home.jupitertech.net"

        envFrom:
          - secretRef:
              name: homepage-synology

        service:
          main:
            ports:
              http:
                port: 3000

        config:
          settings:
            title: Jupiter Tech
            theme: dark
            color: zinc
            headerStyle: clean
            cardBlur: sm
            layout:
              Cluster Management:
                tab: Infrastructure
                style: row
                columns: 4
                icon: mdi-server-network
              Network & Security:
                tab: Infrastructure
                style: row
                columns: 2
                icon: mdi-shield-lock
              Network Hardware:
                tab: Infrastructure
                style: row
                columns: 4
                icon: mdi-router-network
              Media:
                tab: Media
                style: row
                columns: 2
                icon: mdi-television-play
              Media Management:
                tab: Media
                style: row
                columns: 5
                icon: mdi-cog-play
              Quick Links:
                tab: Apps
                icon: mdi-bookmark-multiple

          bookmarks:
            - Quick Links:
                - GitHub:
                    - abbr: GH
                      href: https://github.com/IonBlaster77/homelab
                      icon: github.png

          services:
            - Cluster Management:
                - pgAdmin:
                    href: https://pgadmin.jupitertech.net
                    description: PostgreSQL database administration
                    icon: pgadmin.png
                    siteMonitor: https://pgadmin.jupitertech.net
                    namespace: pgadmin
                    app: pgadmin4
                - ArgoCD:
                    href: https://argocd.jupitertech.net
                    description: GitOps continuous delivery
                    icon: argocd.png
                    siteMonitor: https://argocd.jupitertech.net
                    namespace: argocd
                    app: argocd-server
                - Grafana:
                    href: https://grafana.jupitertech.net
                    description: Metrics & dashboards
                    icon: grafana.png
                    siteMonitor: https://grafana.jupitertech.net
                    namespace: monitoring
                    app: grafana
                - Longhorn:
                    href: https://longhorn.jupitertech.net
                    description: Distributed block storage
                    icon: longhorn.png
                    siteMonitor: https://longhorn.jupitertech.net
                    namespace: longhorn-system
                    app: longhorn

            - Network & Security:
                - Authentik:
                    href: https://auth.jupitertech.net
                    description: Identity provider — SSO, LDAP, RADIUS
                    icon: authentik.png
                    siteMonitor: https://auth.jupitertech.net
                    namespace: authentik
                    app: authentik
                - AdGuard Home:
                    href: https://adguard.jupitertech.net
                    description: Network-wide DNS filtering & ad blocking
                    icon: adguard-home.png
                    siteMonitor: https://adguard.jupitertech.net
                    namespace: adguard
                    app: adguard

            - Media:
                - Jellyfin:
                    href: https://jellyfin.jupitertech.net
                    description: Media server
                    icon: jellyfin.png
                    siteMonitor: https://jellyfin.jupitertech.net
                    namespace: media
                    app: jellyfin
                - Jellyseerr:
                    href: https://jellyseerr.jupitertech.net
                    description: Media request management
                    icon: jellyseerr.png
                    siteMonitor: https://jellyseerr.jupitertech.net
                    namespace: media
                    app: jellyseerr

            - Media Management:
                - Radarr:
                    href: https://radarr.jupitertech.net
                    description: Movie automation
                    icon: radarr.png
                    siteMonitor: https://radarr.jupitertech.net
                    namespace: media
                    app: radarr
                - Sonarr:
                    href: https://sonarr.jupitertech.net
                    description: TV show automation
                    icon: sonarr.png
                    siteMonitor: https://sonarr.jupitertech.net
                    namespace: media
                    app: sonarr
                - Prowlarr:
                    href: https://prowlarr.jupitertech.net
                    description: Indexer management
                    icon: prowlarr.png
                    siteMonitor: https://prowlarr.jupitertech.net
                    namespace: media
                    app: prowlarr
                - qBittorrent:
                    href: https://qbittorrent.jupitertech.net
                    description: Torrent client
                    icon: qbittorrent.png
                    siteMonitor: https://qbittorrent.jupitertech.net
                    namespace: media
                    app: qbittorrent
                - Bazarr:
                    href: https://bazarr.jupitertech.net
                    description: Subtitle automation
                    icon: bazarr.png
                    siteMonitor: https://bazarr.jupitertech.net
                    namespace: media
                    app: bazarr

            - Network Hardware:
                - MikroTik CCR1036:
                    href: http://10.77.10.1
                    description: Core router — AS 65530
                    icon: mikrotik.png
                    siteMonitor: http://10.77.10.1
                    widget:
                      type: prometheus
                      url: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
                      query: mikrotik_system_cpu_load{name="homelab"}
                - Dell N1148P-ON:
                    href: http://10.77.10.2
                    description: Core switch
                    icon: dell.png
                    siteMonitor: http://10.77.10.2
                - HP 1930 Instant On:
                    href: http://10.77.10.5
                    description: PoE access switch
                    icon: hp.png
                    siteMonitor: http://10.77.10.5
                - rack01:
                    href: http://10.77.10.20:5000
                    description: Synology DiskStation
                    icon: synology.png
                    siteMonitor: http://10.77.10.20:5000
                    widget:
                      type: diskstation
                      url: http://10.77.20.20:5000
                      username: "{{HOMEPAGE_VAR_SYNOLOGY_USER}}"
                      password: "{{HOMEPAGE_VAR_SYNOLOGY_PASSWORD}}"
                      volume: volume_1

          widgets:
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: homelab
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true

            - datetime:
                text_size: l
                format:
                  timeStyle: short
                  dateStyle: medium
                  hourCycle: h23

            - search:
                provider: google
                target: _blank

          kubernetes:
            mode: cluster

        persistence:
          custom-css:
            enabled: true
            type: custom
            volumeSpec:
              configMap:
                name: homepage-custom-css
            subPath:
              - path: custom.css
                mountPath: /app/config/custom.css
                readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
