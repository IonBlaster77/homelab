# ArgoCD Application — Gateway API CRDs
#
# Installs the Kubernetes Gateway API Custom Resource Definitions from the
# upstream standard-install.yaml (committed at clusters/homelab/gateway-api-crds/).
#
# MUST be synced before the "gateway" Application — Cilium's Gateway API
# integration requires these CRDs to exist before it starts.
# Also synced before Cilium is reconfigured with gatewayAPI.enabled: true.
#
# Sync order on a fresh cluster:
#   1. Sync this app first
#   2. Sync "cilium" (picks up gatewayAPI.enabled: true from cilium-values.yaml)
#   3. Sync "cert-manager", then "cert-manager-config"
#   4. Sync "gateway" last (Certificate + Gateway + HTTPRoutes)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/IonBlaster77/homelab.git
    targetRevision: HEAD
    path: clusters/homelab/gateway-api-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false    # never auto-delete CRDs — would destroy all gateway resources
      selfHeal: true
    syncOptions:
      - ServerSideApply=true  # required for CRDs (avoids annotation size limits)
