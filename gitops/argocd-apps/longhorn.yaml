apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.7.2
    helm:
      values: |
        defaultSettings:
          defaultReplicaCount: 3
          taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule;node-role.kubernetes.io/master:NoSchedule"
          # createDefaultDiskLabeledNodes: true tells Longhorn to read the
          # node.longhorn.io/default-disks-config annotation on each node
          # (set in the Talos machineconfig) instead of auto-discovering disks.
          # This gives us two tagged disk pools per node:
          #   ssd  → /var/lib/longhorn        (sda4 EPHEMERAL, ~200 GB usable)
          #   nvme → /var/lib/longhorn-nvme   (nvme0n1p1, ~246 GB usable)
          createDefaultDiskLabeledNodes: true
        longhornManager:
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
        longhornDriver:
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
        longhornUI:
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
        csi:
          kubeletRootDir: /var/lib/kubelet
        service:
          ui:
            type: LoadBalancer
            annotations:
              # Pins the Longhorn UI to 10.77.20.51 permanently.
              # Reach the storage dashboard at http://10.77.20.51 from any
              # device on VLAN 20 — stable across cluster rebuilds.
              lbipam.cilium.io/ips: "10.77.20.51"
        ingress:
          enabled: false
        preUpgradeChecker:
          jobEnabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.conversion.webhook.clientConfig.caBundle
        - .spec.preserveUnknownFields
        - .status
