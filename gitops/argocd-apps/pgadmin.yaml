apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://helm.runix.net
    chart: pgadmin4
    targetRevision: 1.62.0
    helm:
      releaseName: pgadmin4
      values: |
        existingSecret: pgadmin-credentials
        env:
          email: admin@jupitertech.net

        persistentVolume:
          enabled: true
          storageClass: longhorn-ssd
          size: 2Gi

        service:
          type: ClusterIP
          port: 80

        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: pgadmin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
