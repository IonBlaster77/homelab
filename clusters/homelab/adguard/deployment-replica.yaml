apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-replica
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard-replica
  template:
    metadata:
      labels:
        app: adguard-replica
        app.kubernetes.io/name: adguard
    spec:
      # Keep primary and replica on different nodes.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: adguard
              topologyKey: kubernetes.io/hostname
      containers:
        - name: adguard
          image: adguard/adguardhome:v0.107.52
          args:
            - --config
            - /opt/adguardhome/conf/AdGuardHome.yaml
            - --work-dir
            - /opt/adguardhome/work
            - --no-check-update
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /opt/adguardhome/conf
            - name: work
              mountPath: /opt/adguardhome/work
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: adguard-config
        - name: work
          emptyDir: {}
