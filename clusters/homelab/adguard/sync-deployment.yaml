apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-sync
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard-sync
  template:
    metadata:
      labels:
        app: adguard-sync
    spec:
      containers:
        - name: sync
          image: lscr.io/linuxserver/adguardhome-sync:latest
          volumeMounts:
            - name: config
              mountPath: /config/adguardhome-sync.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: adguard-sync-credentials
            items:
              - key: config.yaml
                path: config.yaml
