# ArgoCD values — nested under "argo-cd:" because this is an umbrella chart.
# The subchart name in Chart.yaml is "argo-cd", so Helm requires all values
# to live under that key.  These must stay in sync with:
#   clusters/homelab/bootstrap/argocd-values.yaml  (used for manual bootstrap)
#
# To upgrade ArgoCD:
#   1. Bump version in Chart.yaml dependencies
#   2. Run: helm dependency update clusters/homelab/argocd-chart
#   3. Commit Chart.lock and the new charts/argo-cd-X.Y.Z.tgz, delete the old .tgz
#   4. Manually sync the "argocd" ArgoCD Application

argo-cd:
  global:
    domain: ""

  server:
    service:
      type: LoadBalancer
      annotations:
        # lbipam.cilium.io/ips pins this service to exactly 10.77.20.50 every time.
        lbipam.cilium.io/ips: "10.77.20.50"
    ingress:
      enabled: false

  configs:
    params:
      # server.insecure: true — ArgoCD serves plain HTTP.
      # Traffic stays on your local network; the LB IP is only reachable inside 10.77.20.0/24.
      server.insecure: "true"
    cm:
      application.resourceTrackingMethod: annotation
      # Kubernetes 1.35 adds terminatingReplicas to StatefulSet status but the field
      # is not yet in the schema ArgoCD uses for structured merge diff — suppress globally.
      resource.customizations.ignoreDifferences.apps_StatefulSet: |
        jsonPointers:
          - /status/terminatingReplicas
      # Custom Lua health checks for CRDs ArgoCD doesn't understand natively.
      resource.customizations.health.monitoring.coreos.com_Prometheus: |
        hs = {}
        if obj.status ~= nil and obj.status.conditions ~= nil then
          for _, condition in pairs(obj.status.conditions) do
            if condition.type == "Available" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = "Prometheus is available"
              return hs
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for Prometheus to become available"
        return hs

  repoServer:
    volumes:
      - name: sops-age
        secret:
          secretName: sops-age
      - name: custom-tools
        emptyDir: {}
      - name: argocd-cmp-sops
        configMap:
          name: argocd-cmp-sops

    initContainers:
      - name: install-sops
        image: ghcr.io/getsops/sops:v3.12.1
        command: [cp, /usr/local/bin/sops, /custom-tools/sops]
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 999
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - name: custom-tools
            mountPath: /custom-tools

    extraContainers:
      - name: cmp-sops
        image: quay.io/argoproj/argocd:v3.3.7
        command: [/var/run/argocd/argocd-cmp-server]
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        env:
          - name: SOPS_AGE_KEY_FILE
            value: /home/argocd/.config/sops/age/keys.txt
        volumeMounts:
          - name: var-files
            mountPath: /var/run/argocd
          - name: plugins
            mountPath: /home/argocd/cmp-server/plugins
          - name: argocd-cmp-sops
            mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: plugin.yaml
          - name: sops-age
            mountPath: /home/argocd/.config/sops/age
            readOnly: true
          - name: custom-tools
            mountPath: /usr/local/bin/sops
            subPath: sops
