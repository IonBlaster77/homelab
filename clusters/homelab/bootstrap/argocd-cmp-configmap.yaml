apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmp-sops
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: sops
    spec:
      version: v1.0
      generate:
        command:
          - sh
          - -c
          - |
            for f in *.yaml; do
              [ -f "$f" ] || continue
              if grep -q '^sops:' "$f" 2>/dev/null; then
                sops -d "$f" || { echo "sops: failed to decrypt $f" >&2; exit 1; }
              else
                cat "$f"
              fi
              printf '\n---\n'
            done
      discover:
        find:
          command:
            - sh
            - -c
            - find . -maxdepth 1 -name '*.yaml' -exec grep -l '^sops:' {} \; 2>/dev/null | head -1
