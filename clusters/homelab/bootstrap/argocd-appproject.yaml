apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
spec:
  description: HomeLab production cluster
  sourceRepos:
    - https://github.com/IonBlaster77/homelab.git
    - https://charts.goauthentik.io
    - https://helm.runix.net
    - https://kubernetes-sigs.github.io/metrics-server/
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
