apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      serviceAccountName: searxng-sa
      restartPolicy: Always
      # SearXNG's entrypoint reads $SEARXNG_PORT to set its listen port.
      # Kubernetes auto-injects a same-named Docker-links-style env var
      # (SEARXNG_PORT=tcp://<clusterIP>:8080) for the "searxng" Service in
      # this namespace, which collides and breaks the container unless
      # service-link injection is disabled.
      enableServiceLinks: false
      containers:
        - name: searxng
          image: searxng/searxng:2026.7.3-747cec4c2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            # The full settings.yml (incl. secret_key) lives in the Secret —
            # see clusters/homelab/searxng/secret.yaml for why.
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          readinessProbe:
            # SearXNG has no dedicated healthcheck route as of this version;
            # root path reliably returns 200 without needing auth.
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 977
            runAsGroup: 977
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: settings
          secret:
            secretName: searxng-secret
            items:
              - key: settings.yml
                path: settings.yml
            defaultMode: 0444
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng-mcp
  namespace: searxng
  labels:
    app: searxng-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng-mcp
  template:
    metadata:
      labels:
        app: searxng-mcp
    spec:
      serviceAccountName: searxng-sa
      restartPolicy: Always
      # Same class of collision risk as the core deployment above — disabled
      # defensively even though MCP_HTTP_PORT/SEARXNG_URL don't collide today.
      enableServiceLinks: false
      containers:
        - name: searxng-mcp
          image: isokoliuk/mcp-searxng:1.10.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: searxng-mcp-config
          env:
            - name: MCP_HTTP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SEARXNG_MCP_AUTH_TOKEN
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            # Image's default user is the symbolic "node" (uid 1000), not a
            # numeric UID kubelet can verify on its own — same class of issue
            # as crawl4ai's "appuser", confirmed by running `id` in the image.
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
