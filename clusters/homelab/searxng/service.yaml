apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: searxng-mcp
  namespace: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng-mcp
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
