# Run: sops -e -i clusters/homelab/searxng/secret.yaml
# Age public key is stored in Bitwarden under "Homelab SOPS Age Key"
#
# The full settings.yml lives here (not a ConfigMap) because SearXNG's current
# container entrypoint (container/entrypoint.sh) only auto-generates
# server.secret_key when NO settings.yml is mounted at all — if we mount our
# own file (even with a placeholder), the entrypoint uses it completely as-is
# with no patching. So the real secret_key has to already be baked into the
# file we mount, which means the whole file has to live in the Secret.
#
# server.secret_key and SEARXNG_MCP_AUTH_TOKEN below are both
# openssl-rand-hex-32 values.
apiVersion: v1
kind: Secret
metadata:
    name: searxng-secret
    namespace: searxng
    annotations:
        argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
