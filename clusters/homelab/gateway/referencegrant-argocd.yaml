# ReferenceGrant — allow networking namespace to route to argocd/argocd-server
#
# Gateway API cross-namespace security: a Service can only be used as a backend
# by an HTTPRoute in a different namespace if a ReferenceGrant in the Service's
# namespace explicitly permits it.
#
# This grant says: HTTPRoutes in the "networking" namespace may reference
# Services in the "argocd" namespace.

apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-networking-to-argocd
  namespace: argocd
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: networking
  to:
    - group: ""
      kind: Service
