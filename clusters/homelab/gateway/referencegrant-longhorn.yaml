# ReferenceGrant — allow networking namespace to route to longhorn-system/longhorn-frontend
#
# See referencegrant-argocd.yaml for explanation of cross-namespace ReferenceGrants.
#
# This grant says: HTTPRoutes in the "networking" namespace may reference
# Services in the "longhorn-system" namespace.

apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-networking-to-longhorn
  namespace: longhorn-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: networking
  to:
    - group: ""
      kind: Service
