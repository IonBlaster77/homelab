# HTTP → HTTPS redirect
#
# Catches all plain HTTP traffic hitting the gateway on port 80 and
# returns a 301 redirect to the HTTPS equivalent URL.
# Applies to all hostnames — no specific host match needed.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: networking
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: networking
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
