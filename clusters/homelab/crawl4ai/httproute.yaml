apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crawl4ai
  namespace: networking
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: networking
      sectionName: https
  hostnames:
    - crawl4ai.jupitertech.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: crawl4ai
          namespace: crawl4ai
          port: 11235
