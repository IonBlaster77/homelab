# Run: sops -e -i clusters/homelab/crawl4ai/secret.yaml
# Age public key is stored in Bitwarden under "Homelab SOPS Age Key"
#
# Unencrypted structure (reference only — never commit without encryption):
#
# stringData:
#   CRAWL4AI_API_TOKEN: "<random, e.g. openssl rand -hex 32>"
#     Read directly by deploy/docker/entrypoint.sh and enforced by the
#     server's AuthGateMiddleware (constant-time compare) on every route,
#     including the MCP SSE/WS transports. Setting this is also what allows
#     the server to bind beyond loopback (127.0.0.1) — without it the
#     container refuses to expose itself on the pod network at all.
#     This same value must be duplicated into clusters/homelab/hermes/secret.yaml
#     as CRAWL4AI_AUTH_TOKEN so Hermes can send it as a Bearer header.
apiVersion: v1
kind: Secret
metadata:
    name: crawl4ai-secret
    namespace: crawl4ai
    annotations:
        argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
