# Mounted over /app/config.yml (the image's own baked-in config, at a fixed
# path with no env-var override — see deploy/docker/utils.py's load_config()
# and Dockerfile's ARG APP_HOME=/app). This is the full file, not a delta —
# based on the image's default config.yml with three changes for a
# single-user homelab: lower rate_limiting.default_limit, lower
# crawler.pool.max_pages (default 40 is way oversized for our 1-3Gi/1-CPU
# pod), and an explicit empty llm.provider (no LLM extraction — Hermes is the
# reasoning layer, see main requirement sheet §2).
#
# Verify these keys still match the pinned image version's actual config.yml
# shape before upgrading past 0.9.0 — the schema has changed between releases.
apiVersion: v1
kind: ConfigMap
metadata:
  name: crawl4ai-config
  namespace: crawl4ai
data:
  config.yml: |
    app:
      title: "Crawl4AI API"
      version: "1.0.0"
      host: "127.0.0.1"
      port: 11235
      reload: False
      workers: 1
      timeout_keep_alive: 300

    llm:
      provider: ""

    redis:
      # No password here — deploy/docker/entrypoint.sh always generates and
      # exports an ephemeral REDIS_PASSWORD env var for this loopback-only
      # instance regardless of this file, and load_config() tolerates missing
      # keys with a fallback-to-defaults warning.
      host: "localhost"
      port: 6379
      db: 0
      task_ttl_seconds: 3600
      ssl: False
      ssl_cert_reqs: None
      ssl_ca_certs: None
      ssl_certfile: None
      ssl_keyfile: None

    limits:
      max_body_bytes: 10485760
      max_pages: 100
      max_depth: 5
      wall_clock_s: 0
      queue:
        maxsize: 1000
        workers: 4
        per_principal: 0

    # Single-user homelab: no need for 1000/minute headroom.
    rate_limiting:
      enabled: True
      default_limit: "120/minute"
      trusted_proxies: []
      storage_uri: "memory://"

    security:
      enabled: true
      jwt_enabled: false
      api_token: ""
      https_redirect: false
      trusted_hosts: ["*"]
      cors_allow_origins: []
      headers:
        x_content_type_options: "nosniff"
        x_frame_options: "DENY"
        content_security_policy: "default-src 'self'"
        strict_transport_security: "max-age=63072000; includeSubDomains"

    crawler:
      base_config:
        simulate_user: true
      memory_threshold_percent: 95.0
      rate_limiter:
        enabled: true
        base_delay: [1.0, 2.0]
      timeouts:
        stream_init: 30.0
        batch_process: 300.0
      pool:
        # Default is 40 concurrent Chromium pages — oversized for this pod's
        # 512Mi-3Gi memory budget on a single-user homelab.
        max_pages: 5
        idle_ttl_sec: 300
      browser:
        kwargs:
          headless: true
          text_mode: true
        extra_args:
          - "--no-sandbox"
