version: v1alpha1
# Enable verbose logging to the console.
debug: false
persist: true
# Provides machine specific configuration options.
machine:
    # Defines the role of the machine within the cluster.
    type: controlplane
    # The `token` is used by a machine to join the PKI of the cluster.
    token: ENC[AES256_GCM,data:pSSGoGg22L3p8Jshr1IKJQ19CbkiFLs=,iv:jI6DRfefZ7QywKhHo2xrAsbsLOw19mEJaOK0SoFAQ88=,tag:Y5Trek6ohgAtKg0b/UKSBw==,type:str]
