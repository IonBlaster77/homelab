apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-custom-css
  namespace: homepage
data:
  custom.css: |
    /* ── Background: deep space with purple/blue ambient glow ───── */
    body {
      background:
        radial-gradient(ellipse 70% 45% at 15% 8%,  rgba(120,40,220,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 85% 85%, rgba(0,90,200,0.20)   0%, transparent 65%),
        radial-gradient(ellipse 40% 55% at 50% 45%, rgba(30,10,60,0.55)   0%, transparent 100%),
        #05040a !important;
      min-height: 100vh;
    }

    :root {
      --color-text-primary: rgba(255,255,255,0.95);
      --blur: blur(16px);
    }

    /* ── Section wrapper: frosted glass tile base ───────────────── */
    #layout-groups > div {
      border-radius: 18px;
      padding: 10px;
      margin-bottom: 14px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: box-shadow 0.35s ease, transform 0.2s ease;
    }

    #layout-groups > div:hover {
      transform: translateY(-1px);
    }

    /* ── Section header button base ─────────────────────────────── */
    #layout-groups > div > button {
      border-radius: 12px !important;
      padding: 10px 16px !important;
      width: 100%;
      font-weight: 700 !important;
      letter-spacing: 0.07em !important;
      text-transform: uppercase !important;
      font-size: 0.76em !important;
      border-width: 1px !important;
      border-style: solid !important;
      margin-bottom: 6px;
      transition: box-shadow 0.2s ease;
    }

    /* ── Service item cards inside sections ─────────────────────── */
    #layout-groups > div li {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    #layout-groups > div li:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    /* ── Information widgets bar ────────────────────────────────── */
    #information-widgets > div {
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 14px;
    }

    /* ══════════════════════════════════════════════════════════════
       Per-section colour themes  (12 vivid colours)
       1 Electric Purple · 2 Neon Cyan  · 3 Emerald  · 4 Orange
       5 Hot Pink        · 6 Blue       · 7 Yellow   · 8 Rose
       9 Violet          · 10 Teal      · 11 Lime    · 12 Sky
       ═══════════════════════════════════════════════════════════ */

    /* 1 – Electric Purple */
    #layout-groups > div:nth-child(1) {
      background: rgba(168,85,247,0.10) !important;
      border: 1.5px solid rgba(168,85,247,0.55) !important;
      box-shadow: 0 0 30px rgba(168,85,247,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    #layout-groups > div:nth-child(1):hover {
      box-shadow: 0 0 50px rgba(168,85,247,0.42), inset 0 1px 0 rgba(255,255,255,0.10) !important;
    }
    #layout-groups > div:nth-child(1) > button {
      background: rgba(168,85,247,0.28) !important;
      border-color: rgba(168,85,247,0.65) !important;
      box-shadow: 0 0 14px rgba(168,85,247,0.50);
      color: #e9d5ff !important;
    }

