apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-custom-css
  namespace: homepage
data:
  custom.css: |
    /* ── Background: deep space ─────────────────────────────────── */
    body {
      background:
        radial-gradient(ellipse 80% 50% at 10% 5%,  rgba(140,40,255,0.30) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 90%, rgba(0,100,255,0.25)  0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 40%, rgba(50,0,100,0.50)   0%, transparent 100%),
        #04030a !important;
      min-height: 100vh;
    }

    :root {
      --color-text-primary: rgba(255,255,255,0.97);
      --blur: blur(20px);
    }

    /* ── Section wrapper: vivid glass tile ──────────────────────── */
    #layout-groups > div {
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 16px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: box-shadow 0.35s ease, transform 0.2s ease;
    }

    #layout-groups > div:hover {
      transform: translateY(-2px);
    }

    /* ── Section header button base ─────────────────────────────── */
    #layout-groups > div > button {
      border-radius: 12px !important;
      padding: 11px 16px !important;
      width: 100%;
      font-weight: 800 !important;
      letter-spacing: 0.09em !important;
      text-transform: uppercase !important;
      font-size: 0.78em !important;
      border-width: 1px !important;
      border-style: solid !important;
      margin-bottom: 8px;
      transition: box-shadow 0.2s ease;
    }

    /* ── Service item cards ─────────────────────────────────────── */
    #layout-groups > div li {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    #layout-groups > div li:hover {
      filter: brightness(1.20);
      transform: translateY(-1px);
    }

    /* ── Information widgets bar ────────────────────────────────── */
    #information-widgets > div {
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      border-radius: 14px;
    }

    /* ══════════════════════════════════════════════════════════════
