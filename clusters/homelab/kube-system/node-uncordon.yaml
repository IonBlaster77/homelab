apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-uncordon
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-uncordon
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-uncordon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-uncordon
subjects:
  - kind: ServiceAccount
    name: node-uncordon
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-uncordon
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: node-uncordon
  template:
    metadata:
      labels:
        app: node-uncordon
    spec:
      serviceAccountName: node-uncordon
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      initContainers:
        - name: uncordon
          image: registry.k8s.io/kubectl:v1.35.0
          command: ["kubectl", "uncordon"]
          args: ["$(NODE_NAME)"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
