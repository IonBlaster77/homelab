---
apiVersion: v1
kind: Service
metadata:
  name: kea-dhcp4
  namespace: kea
  annotations:
    lbipam.cilium.io/ips: "10.77.20.63"
spec:
  type: LoadBalancer
  selector:
    app: kea-dhcp4
  ports:
    - name: dhcp
      port: 67
      targetPort: 67
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: kea-ctrl-agent
  namespace: kea
spec:
  type: ClusterIP
  selector:
    app: kea-dhcp4
  ports:
    - name: api
      port: 8000
      targetPort: 8000
      protocol: TCP
