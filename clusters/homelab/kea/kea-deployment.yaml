apiVersion: apps/v1
kind: Deployment
metadata:
  name: kea-dhcp4
  namespace: kea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kea-dhcp4
  template:
    metadata:
      labels:
        app: kea-dhcp4
    spec:
      initContainers:
        - name: socket-perms
          image: busybox:1.36
          command: ["chmod", "750", "/kea/sockets"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: ctrl-socket
              mountPath: /kea/sockets
        - name: db-init
          image: postgres:16
          command: ["/bin/sh", "-c"]
          args:
            - |
              PGPASSWORD=$DB_PASSWORD psql \
                -h kea-db-rw.kea.svc.cluster.local \
                -U kea -d kea \
                -c "SELECT version FROM schema_version LIMIT 1" \
              && echo "schema already initialised, skipping" \
              || PGPASSWORD=$DB_PASSWORD psql \
                -h kea-db-rw.kea.svc.cluster.local \
                -U kea -d kea \
                -f /schema/dhcpdb_create.pgsql
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kea-db-credentials
                  key: password
          volumeMounts:
            - name: kea-db-schema
              mountPath: /schema
      containers:
        - name: kea-dhcp4
          image: jonasal/kea-dhcp4:2.6.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed "s|__DB_PASSWORD__|${DB_PASSWORD}|g" /etc/kea/kea-dhcp4.conf.tmpl > /tmp/kea-dhcp4.conf
              exec kea-dhcp4 -c /tmp/kea-dhcp4.conf
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kea-db-credentials
                  key: password
          ports:
            - name: dhcp
              containerPort: 67
              protocol: UDP
          volumeMounts:
            - name: kea-config
              mountPath: /etc/kea
            - name: ctrl-socket
              mountPath: /kea/sockets
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -S /kea/sockets/kea4-ctrl-socket"]
            initialDelaySeconds: 10
            periodSeconds: 5
        - name: kea-ctrl-agent
          image: jonasal/kea-ctrl-agent:2.6.3
          command: ["kea-ctrl-agent", "-c", "/etc/kea/kea-ctrl-agent.conf"]
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: kea-config
              mountPath: /etc/kea
            - name: ctrl-socket
              mountPath: /kea/sockets
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: kea-config
          configMap:
            name: kea-config
        - name: kea-db-schema
          configMap:
            name: kea-db-schema
        - name: ctrl-socket
          emptyDir: {}
