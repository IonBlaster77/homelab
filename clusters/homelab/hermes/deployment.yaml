apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes-sa
      restartPolicy: Always
      # Pin to nodes with sufficient memory headroom (avoid talos1 at ~90%).
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["talos3", "talos4"]

      initContainers:
        - name: fix-perms
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /home/hermes/.hermes"]
          volumeMounts:
            - name: hermes-data
              mountPath: /home/hermes/.hermes
          securityContext:
            runAsUser: 0

        # Merge the hermes-mcp-servers ConfigMap fragment into
        # ~/.hermes/config.yaml's mcp_servers: key. Idempotent (safe on every
        # restart) — deep-merges by key so it neither clobbers config.yaml's
        # other runtime-written settings nor requires config.yaml to already
        # exist. Runs after fix-perms (needs the PVC already chowned to
        # 1000:1000) and as UID 1000 (least-privilege — it only touches its
        # own app's config file).
        - name: merge-mcp-config
          image: mikefarah/yq:4
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: CONFIG_PATH
              value: /home/hermes/.hermes/config.yaml
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -f "$CONFIG_PATH" ]; then
                echo "mcp_servers: {}" > "$CONFIG_PATH"
              fi
              yq eval-all '. as $item ireduce ({}; . * $item)' \
                "$CONFIG_PATH" /mcp-fragment/mcp-servers-fragment.yaml \
                > /tmp/config-merged.yaml
              mv /tmp/config-merged.yaml "$CONFIG_PATH"
          volumeMounts:
            - name: hermes-data
              mountPath: /home/hermes/.hermes
            - name: mcp-servers-fragment
              mountPath: /mcp-fragment
              readOnly: true

        # hermes-webui imports the agent in-process (`from run_agent import
        # AIAgent`) on every chat request. Copy the agent's source (not its
        # venv — different Python version/ABI than the webui image, would
        # break compiled deps) out of the agent image into a shared volume.
        - name: share-agent-src
          image: nousresearch/hermes-agent:v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
          command:
            - sh
            - -c
            - "tar --exclude=node_modules --exclude=.playwright --exclude=.venv -C /opt/hermes -cf - . | tar -C /home/hermeswebui/.hermes/hermes-agent -xf -"
          volumeMounts:
            - name: agent-share
              mountPath: /home/hermeswebui/.hermes/hermes-agent
          securityContext:
            runAsUser: 0

      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: agent-share
          emptyDir: {}
        - name: mcp-servers-fragment
          configMap:
            name: hermes-mcp-servers
        # sshd needs a writable /etc/ssh to generate host keys on first boot.
        - name: ssh-config
          emptyDir: {}
        # authorized_keys injected from the Secret — key-only SSH auth.
        - name: authorized-keys
          secret:
            secretName: hermes-secret
            items:
              - key: SSH_AUTHORIZED_KEYS
                path: authorized_keys
            defaultMode: 0600

      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          envFrom:
            - configMapRef:
                name: hermes-config
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: LLM_API_KEY
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: API_SERVER_KEY
            # Read by config.yaml's mcp_servers.crawl4ai.headers.Authorization
            # via Hermes' ${VAR} substitution (see mcp-servers-configmap.yaml).
            # Must be kept in sync with clusters/homelab/crawl4ai/secret.yaml's
            # CRAWL4AI_API_TOKEN — SOPS secrets aren't shareable cross-namespace.
            - name: CRAWL4AI_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: CRAWL4AI_AUTH_TOKEN
            # Read by config.yaml's mcp_servers.searxng.headers.Authorization.
            # Must be kept in sync with clusters/homelab/searxng/secret.yaml's
            # SEARXNG_MCP_AUTH_TOKEN, enforced by the bridge's MCP_HTTP_AUTH_TOKEN.
            - name: SEARXNG_MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: SEARXNG_MCP_AUTH_TOKEN
          volumeMounts:
            - name: hermes-data
              mountPath: /home/hermes/.hermes
          # GATEWAY_HEALTH_URL in hermes-config points here too. Without this
          # probe, ArgoCD/kubelet only see pod phase, not whether the gateway
          # API server is actually serving — which is how the pod was
          # reported "Healthy" during an outage where chat could not be served.
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

        - name: hermes-webui
          image: ghcr.io/nesquena/hermes-webui:0.51.900@sha256:75ee9c74964443b495d32be642e66201e04c5fe6a53c74863ca65970093d9da0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: hermes-config
          env:
            - name: HERMES_WEBUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: HERMES_WEBUI_PASSWORD
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: API_SERVER_KEY
            - name: HERMES_WEBUI_AGENT_DIR
              value: /home/hermeswebui/.hermes/hermes-agent
            # Routes browser chat through the real Hermes Gateway (same
            # runtime/tool path as the CLI, incl. MCP servers) instead of the
            # in-process run_agent.py fallback, which has no MCP support.
            # HERMES_WEBUI_GATEWAY_BASE_URL defaults to http://127.0.0.1:8642,
            # already correct since both containers share this pod's network
            # and the agent's gateway API server is already enabled
            # (API_SERVER_ENABLED/API_SERVER_PORT in hermes-config). No
            # separate HERMES_WEBUI_GATEWAY_API_KEY needed — it falls back to
            # the API_SERVER_KEY already set on this container below.
            - name: HERMES_WEBUI_CHAT_BACKEND
              value: "gateway"
            # Opts into the runs API gateway path (/v1/runs +
            # /v1/runs/{id}/events) instead of the legacy
            # /v1/chat/completions path. The legacy path silently closes the
            # SSE stream with no error frame when the agent aborts a turn on
            # a non-retryable provider error (e.g. OpenRouter 402), leaving
            # the UI stuck on "Processing" forever. The runs API relays
            # run.failed events, which the WebUI surfaces as a visible
            # apperror bubble. Only takes effect if the gateway also
            # advertises approval capability (see hermes-agent image pin
            # below) — otherwise the WebUI silently falls back to the
            # legacy path and this has no effect.
            - name: HERMES_WEBUI_GATEWAY_USE_RUNS_API
              value: "1"
          ports:
            - containerPort: 8787
              name: webui
          volumeMounts:
            - name: hermes-data
              mountPath: /home/hermes/.hermes
            - name: agent-share
              mountPath: /home/hermeswebui/.hermes/hermes-agent
          # Plain /health (not ?deep=1) — cheap enough for frequent polling;
          # deep checks are for manual/supervisor use only.
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "250m"

        # ------------------------------------------------------------------
        # Container 3 — SSH Sidecar (linuxserver/openssh-server)
        # Runs as root initially so sshd can bind and drop privileges —
        # namespace is labeled pod-security: baseline to permit this.
        # ------------------------------------------------------------------
        - name: hermes-ssh
          image: lscr.io/linuxserver/openssh-server:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: USER_NAME
              value: "hermes"
            - name: PASSWORD_ACCESS
              value: "false"
            - name: SUDO_ACCESS
              value: "false"
            # Point the image's init script at the Secret-backed key file.
            - name: PUBLIC_KEY_FILE
              value: /home/hermes/.ssh/authorized_keys
          ports:
            - containerPort: 2222
              name: ssh
          volumeMounts:
            - name: hermes-data
              mountPath: /home/hermes/.hermes
            - name: ssh-config
              mountPath: /etc/ssh
            - name: authorized-keys
              mountPath: /home/hermes/.ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["SETUID", "SETGID"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
