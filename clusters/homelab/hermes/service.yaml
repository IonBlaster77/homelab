apiVersion: v1
kind: Service
metadata:
  name: hermes-webui
  namespace: hermes
spec:
  type: ClusterIP
  selector:
    app: hermes
  ports:
    - name: http
      port: 8787
      targetPort: 8787
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-ssh
  namespace: hermes
spec:
  type: ClusterIP
  selector:
    app: hermes
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
      protocol: TCP
