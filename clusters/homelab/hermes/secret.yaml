# Run: sops -e -i clusters/homelab/hermes/secret.yaml
# Age public key is stored in Bitwarden under "Homelab SOPS Age Key"
#
# Unencrypted structure (reference only — never commit without encryption):
#
# stringData:
#   LLM_API_KEY: "<api-key-from-nous-portal-or-openrouter>"
#   HERMES_WEBUI_PASSWORD: "<strong-password-for-webui>"
#   API_SERVER_KEY: "<random-key, e.g. openssl rand -hex 32 -- required for gateway api_server to start>"
#   SSH_AUTHORIZED_KEYS: |
#     <scarf-ios-public-key>        # Scarf iOS app → Add Server → Copy public key
#     <wsl-workstation-public-key>  # cat ~/.ssh/id_ed25519.pub
#   CRAWL4AI_AUTH_TOKEN: "<must exactly match CRAWL4AI_API_TOKEN in
#     clusters/homelab/crawl4ai/secret.yaml — SOPS secrets can't be referenced
#     cross-namespace, so this value has to be manually duplicated between the
#     two files any time it's rotated>"
