creation_rules:
  # Talos configs - only encrypt the actual secrets, leave config readable
  - path_regex: clusters/homelab/talos/.*\.yaml$
    age: age1kutgmk5ml0lwf4u53h9um8nfdtjdzgftalpxwlwt2zt63h5l450qeyp7zm
    encrypted_regex: "^(token|key|crt|secret|bootstrapToken|secretboxEncryptionSecret)$"

  # Kubernetes secret manifests - only encrypt secret values, keep metadata readable
  # encrypted_regex restricts SOPS to data/stringData so ArgoCD can see apiVersion/kind/metadata
  - path_regex: clusters/homelab/apps/.*secret.*\.yaml$
    age: age1kutgmk5ml0lwf4u53h9um8nfdtjdzgftalpxwlwt2zt63h5l450qeyp7zm
    encrypted_regex: "^(data|stringData)$"

  # ArgoCD bootstrap secrets
  - path_regex: clusters/homelab/bootstrap/.*secret.*\.yaml$
    age: age1kutgmk5ml0lwf4u53h9um8nfdtjdzgftalpxwlwt2zt63h5l450qeyp7zm
    encrypted_regex: "^(data|stringData)$"

  # cert-manager secrets (Cloudflare API token etc.)
  - path_regex: clusters/homelab/cert-manager/.*secret.*\.yaml$
    age: age1kutgmk5ml0lwf4u53h9um8nfdtjdzgftalpxwlwt2zt63h5l450qeyp7zm
    encrypted_regex: "^(data|stringData)$"

  # AdGuard Home secrets (sync credentials etc.)
  - path_regex: clusters/homelab/adguard/.*secret.*\.yaml$
    age: age1kutgmk5ml0lwf4u53h9um8nfdtjdzgftalpxwlwt2zt63h5l450qeyp7zm
    encrypted_regex: "^(data|stringData)$"

  # Monitoring secrets (Grafana DB credentials, admin password)
  - path_regex: clusters/homelab/monitoring/.*secret.*\.yaml$
    age: age1kutgmk5ml0lwf4u53h9um8nfdtjdzgftalpxwlwt2zt63h5l450qeyp7zm
    encrypted_regex: "^(data|stringData)$"
